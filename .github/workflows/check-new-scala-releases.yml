name: Check for new Scala releases
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip dispatching add-version.yml; just log what would happen"
        required: false
        type: boolean
        default: false
  schedule:
    # 3pm and 9pm in Poland (CEST, UTC+2). During CET (winter) this fires 1h earlier locally.
    - cron: '0 13,19 * * 1-5'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Find new releases and dispatch add-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          known_versions="$(grep -v '^[[:space:]]*$' scala-versions | sort -u)"

          fetch_candidates() {
            local repo="$1"
            gh api "repos/${repo}/releases?per_page=30" \
              --jq '.[] | select(.draft == false) | select(.created_at >= "2026-04-02") | {tag: .tag_name, created_at: .created_at}' \
              -H "Accept: application/vnd.github+json"
          }

          # Collect candidates as JSON lines: {tag, created_at, version, maven_path}
          candidates_file="$(mktemp)"

          fetch_candidates "scala/scala3" \
            | jq -c '. + {version: .tag, artifact: "scala3-compiler_3"}' \
            >> "$candidates_file"

          fetch_candidates "scala/scala" \
            | jq -c '. + {version: (.tag | sub("^v"; "")), artifact: "scala-compiler"}' \
            >> "$candidates_file"

          # Filter out already-known versions, oldest first so we always pick the oldest unreleased one
          new_candidates_file="$(mktemp)"
          while IFS= read -r line; do
            version="$(jq -r '.version' <<<"$line")"
            if ! grep -qxF "$version" <<<"$known_versions"; then
              echo "$line" >> "$new_candidates_file"
            fi
          done < "$candidates_file"

          new_count="$(wc -l < "$new_candidates_file" | tr -d ' ')"
          echo "Found $new_count new release(s) (created on/after 2026-04-02, not in scala-versions)"

          if [ "$new_count" -eq 0 ]; then
            echo "Nothing to do."
            exit 0
          fi

          # Sort oldest first by created_at
          sorted_file="$(mktemp)"
          jq -s 'sort_by(.created_at) | .[]' -c "$new_candidates_file" > "$sorted_file"

          jq -r '"  - " + .version + " (created " + .created_at + ")"' "$sorted_file"

          # Fetch published versions from Maven Central — once per artifact, not per candidate
          maven_versions_file="$(mktemp)"
          for artifact in scala3-compiler_3 scala-compiler; do
            curl -sf "https://repo1.maven.org/maven2/org/scala-lang/${artifact}/maven-metadata.xml" \
              | grep -oE '<version>[^<]+</version>' \
              | sed -E 's:</?version>::g' \
              | awk -v a="$artifact" '{print a" "$0}' \
              >> "$maven_versions_file"
          done

          # Find the oldest candidate that's already published
          picked=""
          while IFS= read -r line; do
            version="$(jq -r '.version' <<<"$line")"
            artifact="$(jq -r '.artifact' <<<"$line")"
            if grep -qxF "$artifact $version" "$maven_versions_file"; then
              echo "$version: available on Maven Central ($artifact)"
              picked="$version"
              break
            else
              echo "$version: not on Maven Central yet ($artifact) — skipping"
            fi
          done < "$sorted_file"

          if [ -z "$picked" ]; then
            echo "No new releases are on Maven Central yet. Will retry next run."
            exit 0
          fi

          if [ "${DRY_RUN:-false}" = "true" ]; then
            echo "[dry-run] Would dispatch add-version.yml for $picked"
          else
            echo "Dispatching add-version.yml for $picked"
            gh workflow run add-version.yml --ref "${GITHUB_REF_NAME}" -f "scala_version=$picked"
          fi
